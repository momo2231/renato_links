<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Renato_muass.hub</title>
<link rel="icon" type="image/gif" href="https://w7.pngwing.com/pngs/1004/494/png-transparent-glock-19-glock-17-40-s-w-glock-23-weapon-handgun-silhouette-black-thumbnail.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Orbitron',sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  background:black;
  color:white;
}

/* INTRO */
#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:26px;
  color:#00f7ff;
  cursor:pointer;
  z-index:999;
}

/* VIDEO */
video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(3px);
  display:none;
}

/* CARD */
.card{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:660px;
  padding:22px 35px;
  border-radius:25px;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(10px);
  display:none;
  box-shadow:0 0 30px rgba(0,255,255,0.25);
}

/* HEADER */
.top{
  text-align:center;
  margin-bottom:20px;
}

.top h1{
  font-size:26px;
  color:#00f7ff;
  letter-spacing:2px;
  text-shadow:0 0 15px #00f7ff;
  position:relative;
}

.top h1::after{
  content:"";
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:-6px;
  width:180px;
  height:2px;
  background:#00f7ff;
}

.role{
  margin-top:8px;
  font-size:12px;
  color:#00f7ff;
}

/* ROW */
.row{
  display:flex;
  align-items:center; /* FIX CENTRATURA */
  justify-content:space-between;
}

.left{
  display:flex;
  align-items:center; /* FIX CENTRATURA */
  gap:15px;
}

.avatar{
  width:80px;
  border-radius:50%;
  border:3px solid #00f7ff;
  box-shadow:0 0 20px #00f7ff;
}

.status-dot{
  width:9px;
  height:9px;
  border-radius:50%;
  display:inline-block;
  margin-right:6px;
}

.activity{
  margin-top:5px;
  font-size:13px;
}

/* MEDIA IMAGE */
#media-box img{
  width:105px;
  border-radius:15px;
  box-shadow:0 0 20px #00f7ff;
}

/* IDLE */
.idle{
  margin-top:8px;
  display:flex;
  align-items:center;
  gap:12px;
  font-size:16px;
  font-weight:700;
  color:#00f7ff;
  text-shadow:0 0 10px #00f7ff;
}

.crown{
  width:26px;
  height:26px;
  fill:white;
  animation:spin 4s linear infinite;
  filter:drop-shadow(0 0 8px white);
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* SOCIAL */
.socials{
  text-align:center;
  margin-top:18px;
}

.socials a{
  margin:0 15px;
}

.socials img{
  width:28px;
  filter:drop-shadow(0 0 8px #00f7ff);
  transition:0.3s;
}

.socials img:hover{
  transform:scale(1.15);
  filter:drop-shadow(0 0 20px #00f7ff);
}

/* VOLUME */
.volume{
  text-align:center;
  margin-top:12px;
}

input[type="range"]{
  width:230px;
  accent-color:#00f7ff;
}
</style>
</head>
<body>

<div id="intro">CLICK TO ENTER</div>

<video id="bg-video" loop muted>
  <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<audio id="music" loop>
  <source src="canzone.mp3" type="audio/mpeg">
</audio>

<div class="card">

  <div class="top">
    <h1>RENATO_MUASS</h1>
    <div class="role">[ developer ]</div>
  </div>

  <div class="row">
    <div class="left">
      <img id="avatar" class="avatar">
      <div>
        <div id="status"></div>
        <div id="game" class="activity"></div>
        <div id="spotify" class="activity"></div>
        <div id="idle-message" class="idle"></div>
      </div>
    </div>
    <div id="media-box"></div>
  </div>

  <div class="socials">
    <a href="https://discord.gg/veg4PaQj" target="_blank">
      <img src="https://cdn.simpleicons.org/discord/ffffff">
    </a>
    <a href="https://www.paypal.com/paypalme/BERNATIM" target="_blank">
      <img src="https://cdn.simpleicons.org/paypal/ffffff">
    </a>
    <a href="https://open.spotify.com/user/31ahng43hi2ggxgm5hfd57s5oyxu" target="_blank">
      <img src="https://cdn.simpleicons.org/spotify/ffffff">
    </a>
    <a href="https://www.tiktok.com/@elrenato_mouhsine080" target="_blank">
      <img src="https://cdn.simpleicons.org/tiktok/ffffff">
    </a>
  </div>

  <div class="volume">
    <input type="range" id="volume" min="0" max="1" step="0.01" value="0.4">
  </div>

</div>

<script>
const userID="971499288997810186";

const intro=document.getElementById("intro");
const video=document.getElementById("bg-video");
const overlay=document.querySelector(".overlay");
const card=document.querySelector(".card");
const music=document.getElementById("music");
const volume=document.getElementById("volume");

intro.addEventListener("click",()=>{
  intro.style.display="none";
  video.style.display="block";
  overlay.style.display="block";
  card.style.display="block";
  video.play().catch(()=>{});
  music.volume=volume.value;
  music.play().catch(()=>{});
});

volume.addEventListener("input",()=>{
  music.volume=volume.value;
});

async function update(){
  const res=await fetch(`https://api.lanyard.rest/v1/users/${userID}`);
  const json=await res.json();
  if(!json.success) return;
  const d=json.data;

  document.getElementById("avatar").src=
  `https://cdn.discordapp.com/avatars/${userID}/${d.discord_user.avatar}.png`;

  let color="gray";
  if(d.discord_status==="online") color="#23a55a";
  if(d.discord_status==="idle") color="#f0b232";
  if(d.discord_status==="dnd") color="#f23f43";

  document.getElementById("status").innerHTML=
  `<span class="status-dot" style="background:${color}"></span>${d.discord_status}`;

  const game=d.activities.find(a=>a.type===0);
  const mediaBox=document.getElementById("media-box");
  const idleBox=document.getElementById("idle-message");

  mediaBox.innerHTML="";
  idleBox.innerHTML="";
  document.getElementById("game").innerText="";
  document.getElementById("spotify").innerText="";

  if(game){
    document.getElementById("game").innerText=`Sta giocando a ${game.name}`;

    if(game.assets?.large_image){
      let img=game.assets.large_image.startsWith("mp:")
      ?`https://media.discordapp.net/${game.assets.large_image.replace("mp:","")}`
      :`https://cdn.discordapp.com/app-assets/${game.application_id}/${game.assets.large_image}.png`;

      mediaBox.innerHTML=`<img src="${img}">`;
    }

  } else if(d.listening_to_spotify){

    document.getElementById("spotify").innerText=
      `Sta ascoltando ${d.spotify.song} di ${d.spotify.artist}`;

    mediaBox.innerHTML=`<img src="${d.spotify.album_art_url}">`;

  } else {

    idleBox.innerHTML=`
      <svg class="crown" viewBox="0 0 24 24">
        <path d="M5 16L3 8l5 4 4-6 4 6 5-4-2 8H5z"/>
      </svg>
      <span>Entra nel mio Discord</span>
    `;
  }
}

update();
setInterval(update,15000);
</script> 

</body>
</html>
