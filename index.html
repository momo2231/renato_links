<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Renato_muass.hub</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Orbitron',sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* CLICK TO ENTER */
#enter-screen{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  cursor:pointer;
  font-size:28px;
  color:#00f7ff;
  animation:textGlow 2s infinite;
}

/* Animazioni */
@keyframes glow{
  0%{box-shadow:0 0 15px #00f7ff;}
  50%{box-shadow:0 0 45px #00f7ff;}
  100%{box-shadow:0 0 15px #00f7ff;}
}

@keyframes textGlow{
  0%{text-shadow:0 0 5px #00f7ff;}
  50%{text-shadow:0 0 20px #00f7ff;}
  100%{text-shadow:0 0 5px #00f7ff;}
}

@keyframes spin3D{
  0%{ transform: rotateY(0deg) rotateX(0deg); }
  100%{ transform: rotateY(360deg) rotateX(360deg); }
}

@keyframes floatCrown{
  0%{ transform: translateY(0px); }
  50%{ transform: translateY(-10px); }
  100%{ transform: translateY(0px); }
}

/* Card */
.card{
  width:600px;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  animation:glow 3s infinite;
}

.avatar{
  width:75px;
  height:75px;
  border-radius:50%;
  object-fit:cover;
}

.activity-img{
  width:80px;
  height:80px;
  border-radius:15px;
  object-fit:cover;
}

.name{
  font-size:18px;
  color:#00f7ff;
}

.role{
  font-size:11px;
  opacity:0.6;
  letter-spacing:2px;
}

.status-dot{
  width:9px;
  height:9px;
  border-radius:50%;
  display:inline-block;
  margin-right:5px;
}

.activity-text{
  margin-top:8px;
  font-size:14px;
  max-width:340px;
}

/* PROMO */
.discord-promo{
  display:none;
  margin-top:25px;
  font-size:26px;
  color:#00f7ff;
  animation:textGlow 2s infinite;
}

.promo-content{
  display:flex;
  align-items:center;
  gap:15px;
  justify-content:center;
}

.crown{
  font-size:32px;

  animation: floatCrown 3s ease-in-out infinite;

  filter:
    brightness(0)
    invert(1)
    drop-shadow(0 0 6px white)
    drop-shadow(0 0 12px white);

  will-change: transform;
}

/* Rotazione più fluida e leggera */
@keyframes floatCrown{
  0%{ transform: translateY(0px); }
  50%{ transform: translateY(-10px); }
  100%{ transform: translateY(0px); }
}

/* Apps */
.apps{
  margin-top:25px;
  display:flex;
  gap:35px;
}

.apps img{
  width:26px;
  opacity:0.7;
  transition:0.3s;
}

.apps img:hover{
  opacity:1;
  transform:scale(1.2);
}

/* Volume */
.volume{
  margin-top:15px;
}

input[type="range"]{
  width:260px;
}

/* Background */
video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}
</style>
</head>
<body>

<div id="enter-screen">CLICK TO ENTER</div>

<video autoplay loop muted>
  <source src="video.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<audio id="music" loop>
  <source src="canzone.mp3" type="audio/mpeg">
</audio>

<!-- CARD -->
<div class="card">
  <div style="display:flex; gap:15px; align-items:center;">
    <img id="avatar" class="avatar">
    <div>
      <div class="name">RENATO_MUASS</div>
      <div class="role">DEVELOPER</div>
      <div id="status"></div>
      <div id="activity-text" class="activity-text"></div>
    </div>
  </div>
  <img id="activity-img" class="activity-img" style="display:none;">
</div>

<!-- PROMO FUORI DALLA CARD -->
<div class="discord-promo" id="promo">
  <div class="promo-content">
<span class="crown">👑</span>
    <span>ENTRA NEL MIO SERVER DISCORD</span>
  </div>
</div>

<!-- APPS -->
<div class="apps">
  <a href="https://discord.gg/veg4PaQj" target="_blank">
    <img src="https://cdn.simpleicons.org/discord/ffffff">
  </a>
  <a href="https://open.spotify.com" target="_blank">
    <img src="https://cdn.simpleicons.org/spotify/ffffff">
  </a>
  <a href="https://www.tiktok.com" target="_blank">
    <img src="https://cdn.simpleicons.org/tiktok/ffffff">
  </a>
</div>

<!-- VOLUME -->
<div class="volume">
  <input type="range" id="volume" min="0" max="1" step="0.01" value="0.4">
</div>

<script>
const userID="971499288997810186";
const music=document.getElementById("music");
const enter=document.getElementById("enter-screen");
const volume=document.getElementById("volume");

music.volume=volume.value;

volume.addEventListener("input",()=>{
  music.volume=volume.value;
});

enter.addEventListener("click",()=>{
  music.play().catch(()=>{});
  enter.style.display="none";
});

async function update(){
  try{
    const res = await fetch(`https://api.lanyard.rest/v1/users/${userID}`);
    const json = await res.json();
    if(!json.success) return;

    const d = json.data;

    document.getElementById("avatar").src =
      `https://cdn.discordapp.com/avatars/${userID}/${d.discord_user.avatar}.png`;

    let color="gray";
    if(d.discord_status==="online") color="#23a55a";
    if(d.discord_status==="idle") color="#f0b232";
    if(d.discord_status==="dnd") color="#f23f43";

    document.getElementById("status").innerHTML =
      `<span class="status-dot" style="background:${color}"></span>${d.discord_status}`;

    const text=document.getElementById("activity-text");
    const promo=document.getElementById("promo");
    const img=document.getElementById("activity-img");

    text.innerHTML="";
    img.style.display="none";
    promo.style.display="none";

    const game = d.activities?.find(a => a.type === 0);

    if(game){
      text.innerHTML=`Sta giocando a ${game.name}`;
      if(game.assets?.large_image){
        img.src=`https://cdn.discordapp.com/app-assets/${game.application_id}/${game.assets.large_image}.png`;
        img.style.display="block";
      }
      return;
    }

    if(d.listening_to_spotify && d.spotify){
      text.innerHTML=`Sta ascoltando ${d.spotify.song} - ${d.spotify.artist}`;
      img.src=d.spotify.album_art_url;
      img.style.display="block";
      return;
    }

    promo.style.display="block";

  }catch(e){
    console.log("Errore Lanyard");
  }
}

update();
setInterval(update,15000);
</script>

</body>
</html>
